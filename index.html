        // Login Component
        function LoginPage({ onLoginSuccess, loading }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [signingIn, setSigningIn] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setSigningIn(true);
                try {

                    setError(err.message || 'Login failed');

            if (loading) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center">

                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center p-4">
                    <div className="bg-slate-800 rounded-lg shadow-xl p-8 w-full max-w-md">

                        <form onSubmit={handleLogin} className="space-y-4">

                                <input

                                    className="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
                                    placeholder="your@email.com"
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-300 mb-2">Password</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
                                    placeholder="â¢â¢â¢â¢â¢â¢â¢â¢"
                                    required
                                />
                            </div>
                            {error && (
                                <div className="p-3 bg-red-900/30 border border-red-700 rounded-lg text-red-300 text-sm">
                                    {error}
                                </div>
                            )}
                            <button
                                type="submit"
                                disabled={signingIn}
                                className="w-full py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-800 disabled:opacity-50 text-white font-medium rounded-lg transition-colors"

                                {signingIn ? 'Signing in...' : 'Sign In'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // Inline Editor Component
        function InlineEditor({ value, onSave, type = 'text', options = [], fieldName = '' }) {
            const [isEditing, setIsEditing] = useState(false);
            const [editValue, setEditValue] = useState(value || '');
            const inputRef = useRef(null);

            useEffect(() => {
                if (isEditing && inputRef.current) {
                    inputRef.current.focus();
                }
            }, [isEditing]);

            const handleSave = () => {
                onSave(editValue);
                setIsEditing(false);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    handleSave();
                } else if (e.key === 'Escape') {
                    setIsEditing(false);
                    setEditValue(value || '');
                }
            };

            if (!isEditing) {
                return (
                    <div
                        onClick={() => setIsEditing(true)}
                        className="cursor-pointer hover:bg-slate-700 px-2 py-1 rounded transition-colors"
                    >
                        {fieldName === 'contactEmail' && value ? (
                            <a href={`mailto:${value}`} onClick={(e) => e.stopPropagation()} className="text-blue-400 hover:underline">
                                {value}
                            </a>
                        ) : (
                            <span className={value ? 'text-slate-200' : 'text-slate-500 italic'}>{value || 'â'}</span>
                        )}
                    </div>
                );
            }

            if (type === 'select') {
                return (
                    <select
                        ref={inputRef}
                        value={editValue}
                        onChange={(e) => setEditValue(e.target.value)}
                        onBlur={handleSave}
                        onKeyDown={handleKeyDown}
                        className="px-2 py-1 bg-slate-700 border border-blue-500 rounded text-white focus:outline-none"
                    >
                        {options.map(opt => (
                            <option key={opt} value={opt}>{opt}</option>
                        ))}
                    </select>
                );
            }

            return (
                <input
                    ref={inputRef}
                    type={type}
                    value={editValue}
                    onChange={(e) => setEditValue(e.target.value)}
                    onBlur={handleSave}
                    onKeyDown={handleKeyDown}
                    className="px-2 py-1 bg-slate-700 border border-blue-500 rounded text-white focus:outline-none w-full"
                />
            );
        }

        // Company Card (Expanded View)
        function CompanyCard({ company, onClose, onUpdate, onDelete, currentUser }) {
            const [isDeleting, setIsDeleting] = useState(false);

            const handleUpdateField = async (field, value) => {
                try {
                    const docRef = db.collection('companies').doc(company.id.toString());
                    const updateData = {
                        [field]: value,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastEditedBy: currentUser.email
                    };
                    await docRef.update(updateData);
                    onUpdate({ ...company, [field]: value });
                } catch (err) {
                    console.error('Error updating field:', err);
                    alert('Failed to update: ' + err.message);
                }
            };

            const handleDeleteCompany = async () => {
                if (!window.confirm(`Are you sure you want to delete "${company.name}"? This cannot be undone.`)) {
                    return;
                }
                setIsDeleting(true);
                try {
                    await db.collection('companies').doc(company.id.toString()).delete();
                    onDelete(company.id);
                } catch (err) {
                    console.error('Error deleting company:', err);
                    alert('Failed to delete: ' + err.message);
                    setIsDeleting(false);
                }
            };

            const handleAddChecklistItem = async () => {
                const text = prompt('Enter checklist item:');
                if (text) {
                    const newChecklist = [...(company.checklist || []), { text, done: false }];
                    await handleUpdateField('checklist', newChecklist);
                }
            };

            const handleToggleChecklistItem = async (index) => {
                const newChecklist = company.checklist ? [...company.checklist] : [];
                if (newChecklist[index]) {
                    newChecklist[index].done = !newChecklist[index].done;
                    await handleUpdateField('checklist', newChecklist);
                }
            };

            const handleRemoveChecklistItem = async (index) => {
                const newChecklist = company.checklist ? [...company.checklist] : [];
                newChecklist.splice(index, 1);
                await handleUpdateField('checklist', newChecklist);
            };

            const totalScore = (company.s1 || 0) + (company.s2 || 0) + (company.s3 || 0) + (company.s4 || 0) + (company.s5 || 0);

            return (
                <div className="bg-slate-800 rounded-lg border border-slate-700 p-6 mb-4 space-y-6">
                    <div className="flex justify-between items-start mb-4">
                        <div>
                            <h3 className="text-2xl font-bold text-white">{company.name}</h3>
                            {company.url && <a href={company.url} target="_blank" rel="noopener noreferrer" className="text-blue-400 hover:underline text-sm">{company.url}</a>}
                        </div>
                        <button
                            onClick={onClose}
                            className="text-slate-400 hover:text-slate-200 text-2xl font-light"
                        >
                            Ã
                        </button>
                    </div>

                    {/* Scores */}
                    <div className="grid grid-cols-5 gap-2">
                        {[1, 2, 3, 4, 5].map(i => (
                            <div key={i} className="bg-slate-700 rounded p-3 text-center">
                                <label className="text-xs text-slate-400 block mb-1">Score {i}</label>
                                <InlineEditor
                                    value={company[`s${i}`] || ''}
                                    onSave={(val) => handleUpdateField(`s${i}`, parseInt(val) || 0)}
                                    type="number"
                                />
                            </div>
                        ))}
                    </div>
                    <div className="bg-slate-700 rounded p-3 text-center">
                        <p className="text-sm text-slate-400 mb-1">Total Score</p>
                        <p className="text-2xl font-bold text-blue-400">{totalScore}</p>
                    </div>

                    {/* Contact Info */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label className="text-sm text-slate-400">Contact Name</label>
                            <InlineEditor
                                value={company.contactName || ''}
                                onSave={(val) => handleUpdateField('contactName', val)}
                            />
                        </div>
                        <div>
                            <label className="text-sm text-slate-400">Contact Email</label>
                            <InlineEditor
                                value={company.contactEmail || ''}
                                onSave={(val) => handleUpdateField('contactEmail', val)}
                                fieldName="contactEmail"
                            />
                        </div>
                        <div>
                            <label className="text-sm text-slate-400">Contact Phone</label>
                            <InlineEditor
                                value={company.contactPhone || ''}
                                onSave={(val) => handleUpdateField('contactPhone', val)}
                            />
                        </div>
                        <div>
                            <label className="text-sm text-slate-400">Contact Role</label>
                            <InlineEditor
                                value={company.contactRole || ''}
                                onSave={(val) => handleUpdateField('contactRole', val)}
                            />
                        </div>
                    </div>

                    {/* Meeting Info */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label className="text-sm text-slate-400">Meeting Date</label>
                            <InlineEditor
                                value={company.meetingDate || ''}
                                onSave={(val) => handleUpdateField('meetingDate', val)}
                            />
                        </div>
                        <div>
                            <label className="text-sm text-slate-400">Meeting Link</label>
                            {company.meetingLink ? (
                                <div className="flex items-center gap-2">
                                    <a href={company.meetingLink} target="_blank" rel="noopener noreferrer" className="text-blue-400 hover:underline text-sm truncate flex-1">
                                        {company.meetingLink}
                                    </a>
                                </div>
                            ) : null}
                            <InlineEditor
                                value={company.meetingLink || ''}
                                onSave={(val) => handleUpdateField('meetingLink', val)}
                            />
                        </div>
                    </div>

                    {/* Task Info */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label className="text-sm text-slate-400">Next Task</label>
                            <InlineEditor
                                value={company.nextTask || ''}
                                onSave={(val) => handleUpdateField('nextTask', val)}
                            />
                        </div>
                        <div>
                            <label className="text-sm text-slate-400">Task Deadline</label>
                            <InlineEditor
                                value={company.taskDeadline || ''}
                                onSave={(val) => handleUpdateField('taskDeadline', val)}
                            />
                        </div>
                        <div>
                            <label className="text-sm text-slate-400">Responsible</label>
                            <InlineEditor
                                value={company.taskResponsible || ''}
                                onSave={(val) => handleUpdateField('taskResponsible', val)}
                            />
                        </div>
                    </div>

                    {/* Additional Fields */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label className="text-sm text-slate-400">Price</label>
                            <InlineEditor
                                value={company.price || ''}
                                onSave={(val) => handleUpdateField('price', val)}
                            />
                        </div>
                        <div>
                            <label className="text-sm text-slate-400">Launch Date</label>
                            <InlineEditor
                                value={company.launch || ''}
                                onSave={(val) => handleUpdateField('launch', val)}
                            />
                        </div>
                    </div>

                    {/* Notes */}
                    <div>
                        <label className="text-sm text-slate-400">Notes</label>
                        <textarea
                            value={company.notes || ''}
                            onChange={(e) => setEditNotes(e.target.value)}
                            onBlur={() => handleUpdateField('notes', company.notes || '')}
                            className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 h-24"
                            placeholder="Add notes..."
                        />
                    </div>

                    {/* Pros/Cons */}
                    <div>
                        <label className="text-sm text-slate-400">Pros & Cons</label>
                        <textarea
                            value={company.prosCons || company.pros || ''}
                            onChange={(e) => setEditProsCons(e.target.value)}
                            onBlur={() => handleUpdateField('prosCons', company.prosCons || company.pros || '')}
                            className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 h-24"
                            placeholder="Add pros and cons..."
                        />
                    </div>

                    {/* Checklist */}
                    <div>
                        <div className="flex justify-between items-center mb-3">
                            <label className="text-sm text-slate-400 font-medium">Checklist</label>
                            <button
                                onClick={handleAddChecklistItem}
                                className="text-xs bg-blue-600 hover:bg-blue-700 px-2 py-1 rounded text-white"
                            >
                                + Add Item
                            </button>
                        </div>
                        <div className="space-y-2">
                            {company.checklist && company.checklist.length > 0 ? (
                                company.checklist.map((item, idx) => (
                                    <div key={idx} className="flex items-center gap-2 bg-slate-700 p-2 rounded">
                                        <input
                                            type="checkbox"
                                            checked={item.done || false}
                                            onChange={() => handleToggleChecklistItem(idx)}
                                            className="w-4 h-4 rounded cursor-pointer"
                                        />
                                        <span className={`flex-1 ${item.done ? 'line-through text-slate-500' : 'text-slate-200'}`}>
                                            {item.text}
                                        </span>
                                        <button
                                            onClick={() => handleRemoveChecklistItem(idx)}
                                            className="text-xs text-red-400 hover:text-red-300"
                                        >
                                            â
                                        </button>
                                    </div>
                                ))
                            ) : (
                                <p className="text-slate-500 text-sm italic">No checklist items yet</p>
                            )}
                        </div>
                    </div>

                    {/* Metadata */}
                    <div className="text-xs text-slate-500 border-t border-slate-700 pt-4">
                        {company.updatedAt && (
                            <p>Last updated: {new Date(company.updatedAt.toDate ? company.updatedAt.toDate() : company.updatedAt).toLocaleString()}</p>
                        )}
                        {company.lastEditedBy && <p>Last edited by: {company.lastEditedBy}</p>}
                    </div>

                    {/* Delete Button */}
                    <button
                        onClick={handleDeleteCompany}
                        disabled={isDeleting}
                        className="w-full py-2 bg-red-700 hover:bg-red-800 disabled:opacity-50 text-white font-medium rounded-lg transition-colors mt-4"
                    >
                        {isDeleting ? 'Deleting...' : 'Delete Company'}
                    </button>
                </div>
            );
        }

        // Company Row Component

            return (
                <tr
                    onClick={onClick}
                    className="border-b border-slate-700 hover:bg-slate-700/50 cursor-pointer transition-colors"

                    <td className="px-4 py-3 font-medium text-white">{company.name}</td>
                    <td className="px-4 py-3">
                        <InlineEditor

                        <span className="font-bold text-blue-400">{totalScore}</span>
                    </td>
                    <td className="px-4 py-3">
                        <InlineEditor
                            value={company.contactName || ''}
                            onSave={(val) => onFieldUpdate(company.id, 'contactName', val)}
                        />
                    </td>
                    <td className="px-4 py-3">
                        <InlineEditor
                            value={company.contactEmail || ''}
                            onSave={(val) => onFieldUpdate(company.id, 'contactEmail', val)}
                            fieldName="contactEmail"
                        />
                    </td>
                    <td className="px-4 py-3">
                        <InlineEditor
                            value={company.contactPhone || ''}
                            onSave={(val) => onFieldUpdate(company.id, 'contactPhone', val)}
                        />
                    </td>
                    <td className="px-4 py-3">
                        <InlineEditor
                            value={company.nextTask || ''}
                            onSave={(val) => onFieldUpdate(company.id, 'nextTask', val)}
                        />
                    </td>
                    <td className="px-4 py-3">
                        <InlineEditor
                            value={company.taskDeadline || ''}
                            onSave={(val) => onFieldUpdate(company.id, 'taskDeadline', val)}
                        />
                    </td>
                    <td className="px-4 py-3">
                        <InlineEditor
                            value={company.taskResponsible || ''}
                            onSave={(val) => onFieldUpdate(company.id, 'taskResponsible', val)}
                        />
                    </td>
                    <td className="px-4 py-3">
                        <div className="flex items-center gap-2">
                            <div className={`w-3 h-3 rounded-full ${riskDots[company.riskLevel || 'none']}`}></div>
                            <InlineEditor
                                value={company.riskLevel || 'none'}
                                onSave={(val) => onFieldUpdate(company.id, 'riskLevel', val)}
                                type="select"
                                options={['none', 'green', 'yellow', 'red']}
                            />
                        </div>
                    </td>
                </tr>
            );
        }

        // Add Company Modal
        function AddCompanyModal({ onClose, onAdd, currentUser }) {
            const [formData, setFormData] = useState({
                name: '',
                url: '',
                status: 'none',
                decision: 'pending'
            });
            const [isAdding, setIsAdding] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.name.trim()) {
                    alert('Company name is required');
                    return;
                }

                setIsAdding(true);
                try {
                    const newCompanyRef = await db.collection('companies').add({
                        name: formData.name,
                        url: formData.url,
                        status: formData.status,
                        decision: formData.decision,
                        s1: 0,
                        s2: 0,
                        s3: 0,
                        s4: 0,
                        s5: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastEditedBy: currentUser.email
                    });
                    onAdd({ id: newCompanyRef.id, ...formData, s1: 0, s2: 0, s3: 0, s4: 0, s5: 0 });
                    onClose();
                } catch (err) {
                    console.error('Error adding company:', err);
                    alert('Failed to add company: ' + err.message);
                    setIsAdding(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-800 rounded-lg p-6 w-full max-w-md">
                        <h2 className="text-2xl font-bold text-white mb-4">Add New Company</h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm text-slate-400 mb-2">Company Name *</label>
                                <input
                                    type="text"
                                    value={formData.name}
                                    onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                    className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded text-white focus:outline-none focus:border-blue-500"
                                    placeholder="e.g., TechCorp Inc"
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-sm text-slate-400 mb-2">Website URL</label>
                                <input
                                    type="url"
                                    value={formData.url}
                                    onChange={(e) => setFormData({ ...formData, url: e.target.value })}
                                    className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded text-white focus:outline-none focus:border-blue-500"
                                    placeholder="https://example.com"
                                />
                            </div>
                            <div>
                                <label className="block text-sm text-slate-400 mb-2">Status</label>
                                <select
                                    value={formData.status}
                                    onChange={(e) => setFormData({ ...formData, status: e.target.value })}
                                    className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded text-white focus:outline-none focus:border-blue-500"
                                >
                                    {['none', 'contacted', 'booked', 'met', 'done', 'rejected'].map(s => (
                                        <option key={s} value={s}>{s.charAt(0).toUpperCase() + s.slice(1)}</option>
                                    ))}
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm text-slate-400 mb-2">Decision</label>
                                <select
                                    value={formData.decision}
                                    onChange={(e) => setFormData({ ...formData, decision: e.target.value })}
                                    className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded text-white focus:outline-none focus:border-blue-500"
                                >
                                    {['pending', 'go', 'nogo'].map(d => (
                                        <option key={d} value={d}>{d.charAt(0).toUpperCase() + d.slice(1)}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="flex gap-3 pt-4">
                                <button
                                    type="button"
                                    onClick={onClose}
                                    className="flex-1 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-colors"
                                >
                                    Cancel
                                </button>
                                <button
                                    type="submit"
                                    disabled={isAdding}
                                    className="flex-1 py-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-medium rounded-lg transition-colors"
                                >
                                    {isAdding ? 'Adding...' : 'Add Company'}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // Main Dashboard Component
        function Dashboard({ user, onLogout }) {
            const [companies, setCompanies] = useState([]);
            const [filteredCompanies, setFilteredCompanies] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showAddModal, setShowAddModal] = useState(false);
            const [expandedId, setExpandedId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [statusFilter, setStatusFilter] = useState('');
            const [decisionFilter, setDecisionFilter] = useState('');
            const [riskFilter, setRiskFilter] = useState('');

            // Load companies from Firestore
            useEffect(() => {
                setLoading(true);
                const unsubscribe = db.collection('companies')
                    .onSnapshot((snapshot) => {
                        const docs = [];
                        snapshot.forEach((doc) => {
                            docs.push({
                                id: doc.id,
                                ...doc.data()
                            });
                        });
                        // Sort by total score descending
                        docs.sort((a, b) => {
                            const scoreA = (a.s1 || 0) + (a.s2 || 0) + (a.s3 || 0) + (a.s4 || 0) + (a.s5 || 0);
                            const scoreB = (b.s1 || 0) + (b.s2 || 0) + (b.s3 || 0) + (b.s4 || 0) + (b.s5 || 0);
                            return scoreB - scoreA;
                        });
                        setCompanies(docs);
                        setLoading(false);
                    }, (error) => {
                        console.error('Error loading companies:', error);
                        setLoading(false);
                    });

                return () => unsubscribe();
            }, []);

            // Apply filters
            useEffect(() => {
                let filtered = companies;

                if (searchTerm) {
                    filtered = filtered.filter(c =>
                        c.name.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                }

                if (statusFilter) {
                    filtered = filtered.filter(c => c.status === statusFilter);
                }

                if (decisionFilter) {
                    filtered = filtered.filter(c => c.decision === decisionFilter);
                }

                if (riskFilter) {
                    filtered = filtered.filter(c => c.riskLevel === riskFilter);
                }

                setFilteredCompanies(filtered);
            }, [companies, searchTerm, statusFilter, decisionFilter, riskFilter]);

            const handleFieldUpdate = async (companyId, field, value) => {
                try {
                    const docRef = db.collection('companies').doc(companyId);
                    const updateData = {
                        [field]: value,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastEditedBy: user.email
                    };
                    await docRef.update(updateData);
                } catch (err) {
                    console.error('Error updating field:', err);
                    alert('Failed to update: ' + err.message);
                }
            };

            const handleAddCompany = (newCompany) => {
                setCompanies([newCompany, ...companies]);
                setShowAddModal(false);
            };

            const handleDeleteCompany = (companyId) => {
                setCompanies(companies.filter(c => c.id !== companyId));
                setExpandedId(null);
            };

            const expandedCompany = companies.find(c => c.id === expandedId);

            if (loading) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
                            <p className="text-slate-300">Loading companies...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-900">
                    {/* Header */}
                    <div className="bg-slate-800 border-b border-slate-700 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold text-white">AVG Telehealth Partner Tracker</h1>
                                <p className="text-sm text-slate-400">Logged in as {user.email}</p>
                            </div>
                            <button
                                onClick={onLogout}
                                className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-medium rounded-lg transition-colors"
                            >
                                Logout
                            </button>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 py-6">
                        {/* Controls */}
                        <div className="mb-6 space-y-4">
                            <div className="flex gap-2 flex-wrap">
                                <button
                                    onClick={() => setShowAddModal(true)}
                                    className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors"
                                >
                                    + Add Company
                                </button>
                            </div>

                            {/* Filters */}
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
                                <input
                                    type="text"
                                    placeholder="Search by company name..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="px-3 py-2 bg-slate-800 border border-slate-700 rounded text-white placeholder-slate-500 focus:outline-none focus:border-blue-500"
                                />
                                <select
                                    value={statusFilter}
                                    onChange={(e) => setStatusFilter(e.target.value)}
                                    className="px-3 py-2 bg-slate-800 border border-slate-700 rounded text-white focus:outline-none focus:border-blue-500"
                                >
                                    <option value="">All Status</option>
                                    {['none', 'contacted', 'booked', 'met', 'done', 'rejected'].map(s => (
                                        <option key={s} value={s}>{s.charAt(0).toUpperCase() + s.slice(1)}</option>
                                    ))}
                                </select>
                                <select
                                    value={decisionFilter}
                                    onChange={(e) => setDecisionFilter(e.target.value)}
                                    className="px-3 py-2 bg-slate-800 border border-slate-700 rounded text-white focus:outline-none focus:border-blue-500"
                                >
                                    <option value="">All Decisions</option>
                                    {['pending', 'go', 'nogo'].map(d => (
                                        <option key={d} value={d}>{d.charAt(0).toUpperCase() + d.slice(1)}</option>
                                    ))}
                                </select>
                                <select
                                    value={riskFilter}
                                    onChange={(e) => setRiskFilter(e.target.value)}
                                    className="px-3 py-2 bg-slate-800 border border-slate-700 rounded text-white focus:outline-none focus:border-blue-500"
                                >
                                    <option value="">All Risk Levels</option>
                                    {['green', 'yellow', 'red', 'none'].map(r => (
                                        <option key={r} value={r}>{r.charAt(0).toUpperCase() + r.slice(1)}</option>
                                    ))}
                                </select>
                            </div>

                            <p className="text-sm text-slate-400">
                                Showing {filteredCompanies.length} of {companies.length} companies
                            </p>
                        </div>

                        {/* Expanded Company Card */}
                        {expandedCompany && (
                            <CompanyCard
                                company={expandedCompany}
                                onClose={() => setExpandedId(null)}
                                onUpdate={(updated) => {
                                    setCompanies(companies.map(c => c.id === updated.id ? updated : c));
                                }}
                                onDelete={handleDeleteCompany}
                                currentUser={user}
                            />
                        )}

                        {/* Table */}
                        <div className="bg-slate-800 rounded-lg border border-slate-700 overflow-x-auto">
                            {filteredCompanies.length === 0 ? (
                                <div className="p-8 text-center text-slate-400">
                                    <p>No companies found. Try adjusting your filters or add a new company.</p>
                                </div>
                            ) : (
                                <table className="w-full">
                                    <thead className="bg-slate-700 border-b border-slate-600">
                                        <tr>
                                            <th className="px-4 py-3 text-left text-sm font-semibold text-slate-200">Name</th>
                                            <th className="px-4 py-3 text-left text-sm font-semibold text-slate-200">Status</th>
                                            <th className="px-4 py-3 text-left text-sm font-semibold text-slate-200">Decision</th>
                                            <th className="px-4 py-3 text-center text-sm font-semibold text-slate-200">Score</th>
                                            <th className="px-4 py-3 text-left text-sm font-semibold text-slate-200">Contact</th>
                                            <th className="px-4 py-3 text-left text-sm font-semibold text-slate-200">Email</th>
                                            <th className="px-4 py-3 text-left text-sm font-semibold text-slate-200">Phone</th>
                                            <th className="px-4 py-3 text-left text-sm font-semibold text-slate-200">Next Task</th>
                                            <th className="px-4 py-3 text-left text-sm font-semibold text-slate-200">Deadline</th>
                                            <th className="px-4 py-3 text-left text-sm font-semibold text-slate-200">Responsible</th>
                                            <th className="px-4 py-3 text-left text-sm font-semibold text-slate-200">Risk</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredCompanies.map(company => (
                                            <CompanyRow
                                                key={company.id}
                                                company={company}
                                                onClick={() => setExpandedId(expandedId === company.id ? null : company.id)}
                                                onFieldUpdate={handleFieldUpdate}
                                            />
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>

                    {/* Add Company Modal */}
                    {showAddModal && (
                        <AddCompanyModal
                            onClose={() => setShowAddModal(false)}
                            onAdd={handleAddCompany}
                            currentUser={user}
                        />
                    )}
                </div>
            );
        }

        // Main App Component
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, []);

            if (loading) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
                            <p className="text-slate-300">Initializing...</p>
                        </div>
                    </div>
                );
            }

            return user ? (
                <Dashboard
                    user={user}
                    onLogout={() => auth.signOut()}
                />
            ) : (
                <LoginPage
                    onLoginSuccess={() => {}}
                    loading={loading}
                />
            );
        }

        // Render the app
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
